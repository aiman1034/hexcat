# Fortinet Transceivers — Stage 1 ledger spec (Phase 4, PDF token mode).
#
# Source: Fortinet_Transceivers.pdf (official, Tier-1 honest-GET). The datasheet's tables
# are TRANSPOSED (SKUs run across header rows, not down a Product-Number column), so the
# Cisco-style HTML column-targeting does not apply. Instead we scan the manufacturer's own
# "Ordering Information" section — a flat, authoritative SKU enumeration — for SKU-shaped
# tokens. Onboarding this brand was a sibling spec file, NOT engine code.

brand: Fortinet
hauptkategorie: Transceivers

# --- Mining -----------------------------------------------------------------------
mine:
  # HTML fields kept for schema completeness (this brand mines via PDF, below).
  pn_header_patterns: ["sku", "product number", "bestellnummer"]
  pn_token: '^(?:FN|FG|FR|SP)-[A-Z0-9]+(?:[-+][A-Z0-9]+)+\+?$'
  pdf:
    mode: token
    # Scope to Fortinet's authoritative orderable list (the pages headed "Ordering
    # Information"), not the whole datasheet — the spec/comparison tables elsewhere repeat
    # base SKUs and packaging variants that are not in the official ordering enumeration.
    scope_heading: "Ordering Information"
    # Trailing '\+?' preserves a final '+' separator: FN-TRAN-QSFPDD-DR4+ (2km) is a DISTINCT
    # product from FN-TRAN-QSFPDD-DR4 (500m); dropping the '+' silently collided & lost it.
    # Likewise SP-CABLE-ADASFP+ / FG-CABLE-SR10-SFP+ must keep their final '+'.
    sku_token: '(?:FN|FG|FR|SP)-[A-Z0-9]+(?:[-+][A-Z0-9]+)+\+?'
    # Column-aware extraction: bucket words into rows and keep only the SKU column (by x-band),
    # so SKU-shaped tokens that appear in the Description prose (FN-TRAN-1BU40 etc.) are not
    # mistaken for orderable SKUs. desc_column feeds the universal V5 cable classifier.
    sku_column: "SKU"
    desc_column: "Description"

# --- Normalization ----------------------------------------------------------------
# No Fortinet feed-variant convention is in scope this session; kept structurally valid.
normalize:
  feed_id_suffix: '-P-[0-9]+$'
  problem_feed_id: "Feed-ID-Anhang"
  spelling_fixes: {}
  problem_spelling: ""

# --- Classification ---------------------------------------------------------------
# First matching rule wins. Cables are matched FIRST (a cable SKU also contains its host
# form-factor token, e.g. FN-CABLE-SFP28-1). Among transceivers, QSFP* is checked before
# SFP* because the substring "SFP+"/"SFP28"/"SFP56" is contained inside "QSFP+"/"QSFP28"/
# "QSFP56". Targets are already locked-22 tokens, so the map below is identity.
classify:
  rules:
    - { pn_contains: "AOC",     unterkategorie: "AOC Kabel" }
    - { pn_contains: "CABLE",   unterkategorie: "DAC Kabel" }
    - { pn_contains: "CFP2",    unterkategorie: "CFP2" }
    - { pn_contains: "QSFPDD",  unterkategorie: "QSFP-DD" }
    - { pn_contains: "QSFP56",  unterkategorie: "QSFP56" }
    - { pn_contains: "QSFP28",  unterkategorie: "QSFP28" }
    - { pn_contains: "QSFP",    unterkategorie: "QSFP+" }
    - { pn_contains: "SFP56",   unterkategorie: "SFP56" }
    - { pn_contains: "SFP28",   unterkategorie: "SFP28" }
    - { pn_contains: "SFP+",    unterkategorie: "SFP+" }
  default: "SFP"

# --- Catalog coverage (V9) --------------------------------------------------------
# The Fortinet transceiver line as enumerated by Fortinet's OWN official transceiver
# datasheet ("Ordering Information" section) — a single authoritative whole-line ordering
# list, so this source IS the catalog (unlike Cisco's 29 fragmented sheets). The expected
# set is therefore exactly the families that authoritative list spans; V9 asserts each has
# >=1 emitted SKU on the merged ledger. Every token is a locked-22 category AND emittable
# (classify rule, default, or the universal V5 cable classifier — MPO/DAC/AOC). There is no
# documented Fortinet transceiver form factor absent from its own ordering list, so a PASS
# here is a true CALIBRATED-COMPLETE, not a vacuous one. (Fortinet has no XFP/X2/CFP/CPAK/CXP/
# QSFP112/QSFP-DD800/OSFP optics in its catalog — deliberately NOT listed, so V9 cannot
# falsely flag families the brand does not make.)
coverage:
  expected_families:
    - SFP
    - SFP+
    - SFP28
    - SFP56
    - QSFP+
    - QSFP28
    - QSFP56
    - QSFP-DD
    - CFP2
    - DAC Kabel
    - AOC Kabel
    - MPO Kabel

# Unterkategorie values above are already canonical locked-22 tokens -> identity map.
locked22_map: {}
