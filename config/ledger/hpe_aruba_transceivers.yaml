# HPE / Aruba Networking Transceivers — Stage 1 ledger spec (Phase 4, PDF section mode).
#
# Source: "AOS-S and AOS-CX Transceiver Guide" (official Aruba PDF, fetched via the headed
# Tier-2 browser path). This is a 220-page COMPATIBILITY MATRIX, not a flat ordering list:
# there is no single Product-Number column to target (HTML-style) and no clean "Ordering
# Information" section to token-scan (Fortinet-style). Instead the document is organised into
# form-factor CHAPTERS ("QSFP-DD modules", "SFP+ Modules", …) whose bold headings are
# double-rendered by the typesetter ("SSFFPP++ MMoodduulleess"). We walk those chapters in
# document order and keep each chapter's own optic callouts, tagging the form factor from the
# heading — the Aruba SKU (JL310A, R0Z21A, …) is opaque to form factor on its own.
#
# Transceiver-vs-switch discipline (the whole reason section mode exists for this brand):
#   * The optic noun must DIRECTLY label the SKU — 'Transceiver (JL309A)', 'AOC (R9B50A)',
#     'DAC (S4B41A)'. Adjacency is enforced in spec.context_re so a distant optic mention
#     ('All 400G AOCs … 9300S model (S0F84A)') does not drag a switch chassis in.
#   * "Module" is deliberately NOT an optic noun here: in this guide '… Module (SKU)' is a
#     SWITCH line-card / uplink module (R0X45A 8400 QSFP28 line card, JL079A 2930M uplink,
#     J9992A 5400R zl2 module), never a transceiver. Including it would reintroduce exactly
#     the switch/transceiver conflation this stage exists to kill.

brand: HPE
hauptkategorie: Transceivers

# --- Mining -----------------------------------------------------------------------
mine:
  # HTML fields kept for schema completeness (this brand mines via PDF section mode, below).
  pn_header_patterns: ["sku", "product number", "bestellnummer"]
  pn_token: '^(?:J[0-9]{4}[A-Z]|J[A-Z][0-9]{3}[A-Z]|[A-Z][0-9][A-Z][0-9]{2}[A-Z]|[0-9]{6}-B21)$'
  pdf:
    mode: section
    # Aruba/HPE optic SKU shapes (anchored inside the '(...)' callout, so no boundary needed):
    #   J9281B / J4858C        -> J + 4 digits + letter   (legacy ProCurve optics)
    #   JL310A / JH231A        -> J + letter + 3 digits + letter
    #   R0Z21A / S3N90A / Q9S67A -> letter,digit,letter,2 digits,letter (current Aruba optics)
    #   487655-B21             -> 6 digits + '-B21'        (legacy HPE/BLc breakout cables)
    sku_token: '(?:J[0-9]{4}[A-Z]|J[A-Z][0-9]{3}[A-Z]|[A-Z][0-9][A-Z][0-9]{2}[A-Z]|[0-9]{6}-B21)'
    # Optic nouns only — Module excluded (it is a switch line-card noun in this guide).
    context_noun: '(?:[Tt]ransceiver|[Xx][Cc][Vv][Rr]|DAC|AOC|[Cc]able)'
    # Headings are bold-double-rendered; collapse both sides before comparing.
    collapse_bold_doubling: true
    # Bold chapter heading (substring) -> locked-22 form factor (the Unterkategorie tag).
    chapters:
      "QSFP-DD modules": "QSFP-DD"
      "QSFP28 modules": "QSFP28"
      "QSFP+ Modules": "QSFP+"
      "SFP56 Modules": "SFP56"
      "SFP28 Modules": "SFP28"
      "SFP+ Modules": "SFP+"
      "SFP Modules": "SFP"

# --- Normalization ----------------------------------------------------------------
# No HPE feed-variant convention is in scope this session; kept structurally valid.
normalize:
  feed_id_suffix: '-P-[0-9]+$'
  problem_feed_id: "Feed-ID-Anhang"
  spelling_fixes: {}
  problem_spelling: ""

# --- Classification ---------------------------------------------------------------
# Section mode tags every PN with its chapter's form factor at mine time, so the engine uses
# that hint directly and these rules are only a structural fallback (HPE SKUs are opaque to
# form factor, so a from-PN classifier cannot work — which is why section mode exists). Kept
# valid against the locked-22 taxonomy so verify_ledger_spec passes.
classify:
  rules: []
  default: "SFP"

# --- Catalog coverage (V9) --------------------------------------------------------
# The form-factor families the SOURCED document — the AOS-S/AOS-CX Transceiver Guide — is
# authoritative for. These are the families the Aruba campus/CX switching line spans, one per
# guide chapter (+ the universal DAC/AOC cable categories). V9 asserts each has >=1 emitted SKU
# on the merged ledger; all are present, so V9 PASSES for the sourced line. Every token is a
# locked-22 category AND emittable (a guide chapter tag or the universal V5 cable classifier).
#
# DELIBERATELY NOT listed — and why (flag-don't-emit, do not guess a family into KNOWN-INCOMPLETE):
#   * QSFP56 / OSFP / QSFP-DD800 / QSFP112 / CFP / CFP2 / XFP / X2 / CPAK / CXP / MPO Kabel —
#     no chapter in this guide emits them and no current source confirms HPE/Aruba ships them,
#     so listing them would make V9 fail on an unverifiable guess rather than a sourced gap.
#   * HPE FlexFabric / Comware (data-center) transceiver line — a genuine KNOWN PRODUCT-LINE
#     gap, but it reuses the SAME form factors already covered here (SFP/SFP+/SFP28/QSFP+/
#     QSFP28/QSFP-DD). It is a SKU-BREADTH gap WITHIN existing families, which V9's form-factor
#     model cannot express; it is tracked in STATUS.md, NOT asserted as a missing V9 family.
#     Closing it = mine the FlexFabric/Comware transceiver source as an ADDITIONAL source and
#     merge (V1-V8 per source), not a coverage edit here.
coverage:
  expected_families:
    - SFP
    - SFP+
    - SFP28
    - SFP56
    - QSFP+
    - QSFP28
    - QSFP-DD
    - DAC Kabel
    - AOC Kabel

# Chapter form-factor tags are already canonical locked-22 tokens -> identity map.
locked22_map: {}
