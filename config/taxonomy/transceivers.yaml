# Canonical Hexwaren taxonomy for the Transceivers category (Phase 1, locked).
#
# This is the operator-facing source of the transceiver taxonomy. Onboarding a new
# CATEGORY (Phase 3+) means adding a sibling file (e.g. taxonomy/switches.yaml), not
# editing engine code.
#
# `subcategories` are the 25 Kategorie-Ebene-3 form factors. Anything not in this list
# is rejected on build; "Sonstige" is never allowed. (POM — Cisco's proprietary SONET/SDH
# Pluggable Optic Module — was REMOVED 2026-06-14: SONET/SDH is out-of-scope for the
# Ethernet/datacom catalog (L8 round-3), and its 8 OC-3/OC-48 SKUs were dropped. CIM8 — the
# NCS 1014 Coherent Interface Module 8 — stays: a real current coherent form factor.)
#
# `attributes` are the fixed 14, IN ORDER. Their order IS the Sortiernummer (1..14) and
# is part of the byte-exact Ameise output contract — so the same 14, in the same order,
# are mirrored in src/hexcat/constants.py (TRANSCEIVER_ATTRIBUTES). config.verify_taxonomy()
# fails loudly if this file and that tuple ever drift, so edit BOTH together.

category: transceivers

# Emitted verbatim; kept here so the taxonomy file is self-describing. The build reads the
# authoritative copies from config/rules.yaml (constants block) — these must match.
kategorie_ebene_2: "Transceivers & SFP Module"     # WITH final "e"
attributgruppe: "Transceivers & SFP Modul"         # NO final "e" — one char different, intentional

# Kategorie Ebene 3 — the 25 locked form factors. (SFP-DD + QSFP28-DD added 2026-06-15 for Dell
# S56DD-100G / Q28DD-200G modules — real current form factors, a taxonomy gap fixed not excluded.)
subcategories:
  - "DAC Kabel"
  - "AOC Kabel"
  - "MPO Kabel"
  - "QSFP+"
  - "QSFP-DD"
  - "QSFP-DD800"
  - "QSFP28"
  - "QSFP28-DD"
  - "QSFP56"
  - "QSFP112"
  - "OSFP"
  - "SFP"
  - "SFP+"
  - "SFP-DD"
  - "SFP28"
  - "SFP56"
  - "X2"
  - "XENPAK"
  - "XFP"
  - "CFP"
  - "CFP2"
  - "CPAK"
  - "CXP"
  - "GBIC"
  - "CIM8"

# The 14 fixed attributes, in Sortiernummer order. `name` is the emitted Attributname;
# `intake_field` is the wide-intake column it is read from.
attributes:
  - { name: "Formfaktor",         intake_field: "Formfaktor" }
  - { name: "Geschwindigkeit",    intake_field: "Geschwindigkeit" }
  - { name: "Transceiver Typ",    intake_field: "TransceiverTyp" }
  - { name: "Faseranzahl",        intake_field: "Faseranzahl" }
  - { name: "Fasertyp",           intake_field: "Fasertyp" }
  - { name: "Anschlusstyp",       intake_field: "Anschlusstyp" }
  - { name: "Länge",              intake_field: "Laenge" }
  - { name: "Kabeltyp",           intake_field: "Kabeltyp" }
  - { name: "Wellenlänge",        intake_field: "Wellenlaenge" }
  - { name: "Anwendung",          intake_field: "Anwendung" }
  - { name: "Reichweite",         intake_field: "Reichweite" }
  - { name: "DOM Unterstützung",  intake_field: "DOMUnterstuetzung" }
  - { name: "Betriebstemperatur", intake_field: "Betriebstemperatur" }
  - { name: "Standard",           intake_field: "Standard" }
