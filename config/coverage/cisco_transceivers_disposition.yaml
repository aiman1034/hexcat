policy: Every PN Cisco publishes that the shipped catalog lacks is accounted for here with a grounded disposition, decided from config (locked-22 taxonomy + the Cisco ledger's coverage.expected_families),
  never a hand-typed reason. ADD = ledger-add candidate (form factor is BOTH a locked-22 token AND in expected_families). EXCLUDE_SCOPE = valid locked-22 form factor but outside the curated Cisco scope
  (e.g. legacy XENPAK/GBIC; the corpus carries the successor X2). EXCLUDE_TAXONOMY = form factor genuinely absent from the 22 locked subcategories (e.g. POM SONET/SDH). EXCLUDE_NOT_TRANSCEIVER = not a pluggable
  optic. REVIEW = held for operator confirmation. Flag, don't emit; nothing is silently dropped. $0, deterministic.
