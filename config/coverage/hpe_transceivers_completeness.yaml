# COMPLETENESS RE-CONFIRMATION (2026-06-13, independent of the prior curation): a full-guide PN-token
# diff found 373 PN-shaped tokens in the guide beyond the 147. EVERY one was verified NOT to be a
# missed standalone transceiver — they are:
#   * SWITCHES / line-cards / bundles (e.g. R0X44A = Aruba 6400 Switch Series, R8P13A = 48Y6C bundle)
#   * EOL/EOS *revisions* of a captured product (e.g. JL563A/JL563B are EOS revs of the captured JL563C)
#   * ALIASES of a captured SKU (e.g. R9F75A == JL309A, which IS captured; verified by alias notation
#     "R9F75A(JL309A)[SR4]" in the guide)
#   * compatibility CROSS-REFERENCES in notes (50G-in-10G-port warnings, split-mode tables, etc.)
# None of the 373 has a standalone "product name (SKU)" spec row (the signature of a catalog
# transceiver). Verified programmatically: 0 of the candidates (R9F75A/R0X39A/R0X43A/R8M51A/R8M55A/
# R8Z96A/R9A29A/JL309A) carry a standalone product row. -> the 147 IS the complete transceiver set.
