flag_ungrounded:
- pn: QDD-800G-VR8
  source: tmg_matrix
  disposition: FLAG_UNGROUNDED
  description: 800GBASE-VR8 QSFP-DD800 (8x100G VSR, MMF)
  reason: 'Fetched the authoritative Cisco QSFP-DD800 datasheet fresh (HTTP 200, 2026) — it lists ONLY QDD-8X100G-FR and QDD-2X400G-FR4; no QDD-800G-VR8. Cisco ships 800GBASE-VR8 only in the OSFP form factor (OSFP-800G-VR8, per osfp-800g-transceiver-modules-ds). 800GBASE-VR8 QSFP-DD is a real MSA standard with third-party compatibles, but no Cisco datasheet confirms a QDD-800G-VR8 SKU. Held (flag-don''t-emit) pending a confirming Cisco source rather than authored from a non-Cisco spec.'
  datasheet: https://www.cisco.com/c/en/us/products/collateral/interfaces-modules/transceiver-modules/qsfp-dd800-transceiver-modules-ds.html
- pn: SFP10G-USR
  source: tmg_matrix
  disposition: FLAG_UNGROUNDED
  description: 10GBASE-USR SFP+ (ultra short reach, MMF)
  reason: 'Fetched the authoritative Cisco 10GBASE SFP+ datasheet (c78-455693) fresh (HTTP 200, 2026) — SFP10G-USR appears only in a related-parts list, with NO specification row (rate/wavelength/reach/fiber/connector/temperature). The part is EOL and dropped from the current datasheet revision. USR reach is vendor-specific ultra-short (shorter than SR), so it must not be authored as generic 10GBASE-SR. Held (flag-don''t-emit) pending a Cisco source that states the real USR reach.'
  datasheet: https://www.cisco.com/c/en/us/products/collateral/interfaces-modules/transceiver-modules/data_sheet_c78-455693.html
