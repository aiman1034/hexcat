# Independent COMPLETENESS enumerations for the TRANSCEIVERS category — the per-category SEAM
# for lib/completeness.py, a sibling of config/sources/<category>.yaml (the harvest seam).
#
# This file carries ALL category/brand knowledge about WHERE the authoritative yardstick lives;
# the reconciler code carries none. Completeness is verified against the UNION of several
# INDEPENDENT official enumerations — never one list, never the harvest itself (that is
# circular). Each source points at a tracked plain-text SNAPSHOT (one PN per line, '#' comments)
# under config/coverage/enumerations/ — a VERBATIM capture of an official Cisco list. A snapshot
# is NEVER fabricated or pattern-generated; an un-gathered source is simply an empty/absent file
# and does not count toward the completeness verdict until populated.
#
# Why several sources: each covers the others' blind spots.
#   * compatibility_matrix — the optics-to-device matrix = the canonical CURRENT-product list,
#     but it drops EOL parts.
#   * eol_eos_bulletins    — captures the legacy XENPAK / GBIC / POM optics a current list omits.
#   * ordering_guide       — the transceiver ordering / product-family guide.
#   * price_list           — the GPL: every orderable PN, the broadest single net.
# Their UNION is the ground-truth universe the harvest must cover (modulo confirmed-gone).

category: transceivers

brands:
  Cisco:
    # PNs proven permanently gone (hard 404/410 recorded by the deferred queue). Excused from
    # the gap list but still tracked — never silently dropped. Empty until something is proven
    # gone; "blocked" or "not-yet-fetched" is NEVER recorded here.
    confirmed_gone: []

    # Cisco's compatibility matrix lists Meraki MA-*/MGB* optics (Cisco owns Meraki). Those PIDs
    # are a SEPARATE catalog brand (own Hersteller token) — routed out of the Cisco universe and
    # reconciled under the Meraki brand below. Verbatim snapshots stay intact; routing is at
    # reconcile time so nothing is silently dropped.
    route_out:
      - '^MA-'
      - '^MGB'

    # Universe PNs deliberately NOT carried — out of Hexwaren's transceiver scope by PROTOCOL, not a
    # gap: SONET/SDH framing optics, Fibre Channel optics, and TDM/circuit-emulation framers. These
    # appear in the TMG matrix (they are Cisco optics) but Hexwaren sells Ethernet transceivers, so
    # they are excused from the gap list and reported. Operator-confirmed drop 2026-06-16; reason-coded
    # (reason_code out-of-scope) in config/coverage/gate_completeness.yaml and dropped from the bundle.
    # Detected + fixture-proven by gate.check_scope_exclusion (SONET/SDH + FC by Standard; TDM by PN).
    out_of_scope:
      # SONET/SDH (14)
      - ONS-SI-2G-S1
      - SFP-OC3-MM
      - SFP-OC3-SR
      - SFP-OC3-IR1
      - SFP-OC3-LR1
      - SFP-OC3-LR2
      - SFP-OC12-MM
      - SFP-OC12-SR
      - SFP-OC12-IR1
      - SFP-OC12-LR1
      - SFP-OC12-LR2
      - SFP-OC48-SR
      - SFP-OC48-IR1
      - SFP-OC48-LR2
      # Fibre Channel (24)
      - DS-SFP-FC-2G-SW
      - DS-SFP-FC-2G-LW
      - DS-SFP-FC4G-SW
      - DS-SFP-FC4G-LW
      - DS-SFP-FC4G-MR
      - DS-SFP-FC8G-SW
      - DS-SFP-FC8G-LW
      - DS-SFP-FC8G-ER
      - DS-SFP-FC10G-SW
      - DS-SFP-FC10G-LW
      - DS-SFP-FC16G-SW
      - DS-SFP-FC16G-LW
      - DS-SFP-FC16G-ELW
      - DS-SFP-FC16GELW
      - DS-SFP-FC32G-SW
      - DS-SFP-FC32G-LW
      - DS-SFP-FC32G-ELW
      - DS-SFP-FC64G-SW
      - DS-SFP-FC64G-LW
      - DS-SFP-4X32G-SW
      - DS-X2-FC10G-SR
      - DS-X2-FC10G-LR
      - DS-X2-FC10G-ER
      - DS-X2-FC10G-CX4
      # TDM / circuit-emulation (6): SAToP pseudowire + channelized/transparent OC-x Smart-SFP framers
      - SFP-E1F-SATOP-I
      - SFP-T1F-SATOP-I
      - SFP-T3F-SATOP-I
      - SFP-CH-OC3STM1-I
      - SFP-TS-OC3STM1-I
      - SFP-TS-OC12STM4-I
      # Coherent DWDM trunk (NCS-1014 line modules, 3) — operator reversal 2026-06-20: coherent DWDM
      # transport modules are NOT pluggable Ethernet transceivers (same out-of-scope call as POM SONET).
      - CIM8-C-K9
      - CIM8-CE-K9
      - CIM8-LE-K9

    sources:
      - id: tmg_matrix
        kind: compatibility_matrix
        note: >-
          Cisco TMG optics-to-device compatibility matrix (tmgmatrix.cisco.com) — canonical
          enumeration of currently-shipping transceivers. A JS single-page app: the snapshot is
          captured by fully rendering, scrolling, paginating and expanding every filter state
          until the row count matches the matrix's stated total.
        snapshot: config/coverage/enumerations/cisco_tmg_matrix.txt

      - id: eol_eos_bulletins
        kind: eol_eos_bulletins
        note: >-
          Cisco End-of-Sale / End-of-Life bulletins for transceiver modules — enumerates the
          legacy XENPAK / GBIC / POM and other EOL optics that a current-product list drops. EOL
          is an informational flag here, never an exclusion reason.
        snapshot: config/coverage/enumerations/cisco_eol_bulletins.txt

      - id: ordering_guide
        kind: ordering_guide
        note: >-
          Cisco transceiver ordering / product-family guide — derived from the official MASTER
          transceiver datasheet listing (datasheet-listing.html), which indexes every current
          product-family datasheet. The snapshot is the UNION of PNs mined (by the tool's
          deterministic miner) from exactly those master-listed datasheets — Cisco's own catalog
          of current sellable optics, independent of the compatibility matrix and EOL bulletins.
        snapshot: config/coverage/enumerations/cisco_ordering_guide.txt

      - id: gpl_price_list
        kind: price_list
        # INACCESSIBLE AT $0 (flag-don't-fabricate): the Cisco Global Price List is gated behind
        # CCO / Cisco Commerce (CCW) authentication with a service-contract entitlement. Probed
        # 2026-06-13 via the local bridge — apps.cisco.com/ccw/.../pricing returns an SSO login
        # wall (title "Cisco", no price data), not a bulk list. There is no public per-category
        # GPL page (price-list.html -> 404). We therefore CANNOT mine it at $0 without credentials
        # and will NOT fabricate it. Source stays empty/unpopulated (does not count toward the
        # verdict). The universe rests on the three accessible independent enumerations above;
        # the ordering-guide reconcile (gaps=0) shows the harvest already covers Cisco's current
        # catalog, so the GPL's marginal coverage over matrix+EOL+ordering is expected to be nil.
        note: >-
          Cisco Global Price List (GPL) — every orderable PN. INACCESSIBLE at $0 (auth-gated);
          left unpopulated and honestly flagged rather than fabricated. See comment above.
        snapshot: config/coverage/enumerations/cisco_gpl.txt

  # Meraki — Cisco's cloud-managed line. Cisco publishes its MA-*/MGB* optics in the TMG matrix;
  # the Meraki-branded subset is captured verbatim here and reconciled as its own brand.
  Meraki:
    confirmed_gone: []
    sources:
      - id: tmg_matrix_meraki
        kind: compatibility_matrix
        note: >-
          Meraki MA-*/MGB* optics as published in the Cisco TMG optics-to-device compatibility
          matrix — the verbatim Meraki-branded subset of that matrix capture.
        snapshot: config/coverage/enumerations/meraki_tmg_matrix.txt
