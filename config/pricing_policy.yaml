# §5 pricing POLICY — operator knobs for the deterministic pricing engine (src/hexcat/pricing.py).
# These are POLICY defaults, NOT claims about real market prices. They must be CONFIRMED by the
# operator (and validated by `pricing.back_test` against known-priced SKUs) before any auto-price
# is trusted for a live import. The engine never fabricates a price: it derives one only from a
# grounded input (T1 market / T2 list / T3 cost) and flags everything else.
policy:
  # T2: net sell price = manufacturer list price (UVP/MSRP) * list_to_net.
  list_to_net: 0.55
  # T3: net sell price = operator cost basis * (1 + cost_markup).
  cost_markup: 0.35
  # Guard: acceptable gross margin band (sell - cost)/sell vs a known cost. Outside -> price blocked.
  margin_min: 0.10
  margin_max: 0.80
  # Guard: relative cross-tier disagreement above which a chosen tier is flagged for review (WARN).
  tier_tolerance: 0.25
  # Back-test passes when MAPE over known-priced samples is at or below this.
  backtest_max_mape: 0.20
  # A resolved price above this is FLAGGED for optional operator review (recorded, not blocking).
  high_value_eur: 1500
  # Relative [low,high]/median spread above which the comp is FLAGGED as wide (review).
  max_spread: 0.6

# §5 T1-MARKET — bridge-based new-sealed reseller comp. Position at the MEDIAN of authorized
# new-sealed-original dealers (real street price -> no list->net factor). Refurb/compatible/gray
# sellers are excluded (see lib/market_comp.AUTHORIZED/EXCLUDED). Each observation traces to its URL.
market:
  position: median          # median of the authorized new-sealed competitors
  min_sources: 1            # >=1 grounds a price; a single source is FLAGGED, never dropped
  assume_unknown_is_gross: true   # conservative: unmarked B2C prices treated as incl. MwSt -> /1,19

# Per-category (Kategorie Ebene 3) plausibility band in EUR net. A resolved price OUTSIDE the band
# is BLOCKED (absurd -> stays honest flagged-debt, never shipped). Bands are deliberately WIDE —
# they reject nonsense (a €2 100G optic, a €90.000 SFP), not normal price variation. Operator-tunable.
category_bands:
  "DAC Kabel":   {floor: 10,  ceiling: 3000}
  "AOC Kabel":   {floor: 20,  ceiling: 4000}
  "MPO Kabel":   {floor: 10,  ceiling: 3000}
  "SFP":         {floor: 5,   ceiling: 1500}
  "SFP+":        {floor: 8,   ceiling: 2000}
  "SFP28":       {floor: 10,  ceiling: 2500}
  "SFP56":       {floor: 20,  ceiling: 3500}
  "QSFP+":       {floor: 20,  ceiling: 3500}
  "QSFP28":      {floor: 30,  ceiling: 6000}
  "QSFP56":      {floor: 50,  ceiling: 8000}
  "QSFP-DD":     {floor: 80,  ceiling: 20000}
  "QSFP-DD800":  {floor: 150, ceiling: 30000}
  "QSFP112":     {floor: 80,  ceiling: 20000}
  "OSFP":        {floor: 100, ceiling: 30000}
  "X2":          {floor: 30,  ceiling: 4000}
  "XENPAK":      {floor: 50,  ceiling: 5000}
  "XFP":         {floor: 20,  ceiling: 4000}
  "CFP":         {floor: 200, ceiling: 25000}
  "CFP2":        {floor: 200, ceiling: 30000}
  "CPAK":        {floor: 200, ceiling: 25000}
  "CXP":         {floor: 100, ceiling: 15000}
  "GBIC":        {floor: 10,  ceiling: 2500}
  "POM":         {floor: 30,  ceiling: 6000}
  "CIM8":        {floor: 1000, ceiling: 80000}
  "_default":    {floor: 5,   ceiling: 80000}

# Family-band OVERRIDES (keyed by lib.market_comp.family_key). DWDM/CWDM channel optics are premium
# and far pricier than the vanilla form factor they share a token with (a DWDM-XFP costs many times
# a generic XFP), so they need their own wider bands — otherwise the category ceiling wrongly BLOCKS
# a legitimate legacy price. Grounded by observed genuine-new street prices (X2/XFP list ~$9-11k).
family_bands:
  "DWDM-XENPAK":  {floor: 150, ceiling: 6000}
  "DWDM-X2":      {floor: 150, ceiling: 12000}
  "DWDM-XFP":     {floor: 150, ceiling: 12000}
  "DWDM-GBIC":    {floor: 100, ceiling: 8000}
  "DWDM-SFP10G":  {floor: 100, ceiling: 8000}
  "DWDM-SFP":     {floor: 100, ceiling: 8000}
  "CWDM-SFP":     {floor: 50,  ceiling: 4000}
  "CWDM-SFP10G":  {floor: 80,  ceiling: 6000}
