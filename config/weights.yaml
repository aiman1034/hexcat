# HexCat — per-form-factor weights (kg). Keyed by the Formfaktor attribute value.
# Used to DERIVE Artikelgewicht / Versandgewicht when the intake cell is blank.
#
# !!! ALL VALUES BELOW ARE PLACEHOLDERS !!!
# Real per-form-factor weights are genuinely unknown at Phase 1. Every entry is
# marked "# PLACEHOLDER — confirm". The supervisor report tells the operator which
# emitted weights are still placeholders so they can be confirmed before a live import.
#
# Invariant enforced by config loader + validation gate: versand > artikel for every row.
# Units: kilograms. Decimals as plain numbers here; output is German-locale formatted.

defaults:
  # Fallback used when a Formfaktor has no specific entry below. Also a placeholder.
  artikel: 0.05   # PLACEHOLDER — confirm
  versand: 0.20   # PLACEHOLDER — confirm

