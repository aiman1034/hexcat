# HexCat — single source of truth for all locked catalog values (Phase 1).
# Everything the operator might one day tweak lives here, NOT hardcoded in logic.
# Structural column orders/headers live in src/hexcat/constants.py (not operator-tweakable).

# Vendor -> (Hersteller token, URL slug). Keys are matched case-insensitively.
vendors:
  "HP":      { hersteller: "HP",      slug: "hpe-aruba" }
  "HPE":     { hersteller: "HP",      slug: "hpe-aruba" }
  "Aruba":   { hersteller: "HP",      slug: "hpe-aruba" }
  "Cisco":   { hersteller: "Cisco",   slug: "cisco" }
  "Juniper": { hersteller: "Juniper", slug: "juniper" }
  "Arista":  { hersteller: "Arista",  slug: "arista" }
  "Meraki":  { hersteller: "Meraki",  slug: "meraki" }
  "Fortinet": { hersteller: "Fortinet", slug: "fortinet" }
  "MikroTik": { hersteller: "MikroTik", slug: "mikrotik" }
  "NVIDIA":  { hersteller: "NVIDIA",  slug: "nvidia" }
  "Extreme": { hersteller: "Extreme", slug: "extreme" }
  "Dell":    { hersteller: "Dell",    slug: "dell" }
  "Lenovo":  { hersteller: "Lenovo",  slug: "lenovo" }
  "Ubiquiti": { hersteller: "Ubiquiti", slug: "ubiquiti" }
  "Supermicro": { hersteller: "Supermicro", slug: "supermicro" }

# Fixed constants emitted verbatim.
constants:
  kategorie_ebene_1: "Netzwerk & Infrastruktur"
  kategorie_ebene_2: "Transceivers & SFP Module"      # WITH final "e"
  versandklasse: "standard"
  verkaufseinheit: "Stk"
  bestandsfuehrung_aktiv: "Y"
  ueberverkaeufe_moeglich: "Y"
  ueberverkauf_plattform_hexwaren: "TRUE"
  # Attributgruppe is intentionally ONE character different from kategorie_ebene_2:
  # "Modul" (no final "e"). This distinction is real and must be preserved.
  attributgruppe_transceiver: "Transceivers & SFP Modul"   # NO final "e"
  # SWITCHES (Rule-7 signed off 2026-06-14). L2 "Switches"; Attributgruppe "Switch" (the singular —
  # a real word, the "singular of the last noun" convention, still ≠ the L2). See SWITCHES_SCHEMA_PROPOSAL.md.
  kategorie_ebene_2_switch: "Switches"
  attributgruppe_switch: "Switch"

# Locked Kategorie Ebene 3 set (25). Anything else is rejected; "Sonstige" never allowed.
# (CIM8 = Cisco NCS 1014 Coherent Interface Module 8 was REMOVED 2026-06-20: coherent DWDM transport is
# out-of-scope (not a pluggable Ethernet transceiver), its 3 NCS-1014 SKUs dropped — the SECOND operator-
# authorized domain exclusion alongside POM. POM = Cisco SONET/SDH Pluggable Optic Module REMOVED 2026-06-14:
# SONET/SDH ruled out-of-scope for the Ethernet/datacom catalog (L8 round-3), its 8 SKUs dropped.
# Must stay in lock-step with config/taxonomy/transceivers.yaml subcategories.)
kategorie_ebene_3_allowed:
  - "DAC Kabel"
  - "AOC Kabel"
  - "MPO Kabel"
  - "QSFP+"
  - "QSFP-DD"
  - "QSFP-DD800"
  - "QSFP28"
  - "QSFP28-DD"
  - "QSFP56"
  - "QSFP112"
  - "OSFP"
  - "SFP"
  - "SFP+"
  - "SFP-DD"
  - "DSFP"
  - "SFP28"
  - "SFP56"
  - "X2"
  - "XENPAK"
  - "XFP"
  - "CFP"
  - "CFP2"
  - "CPAK"
  - "CXP"
  - "GBIC"

# Locked SWITCH Kategorie Ebene 3 set (6) — Rule-7 signed off. Single token per SKU by ENVIRONMENT-FIRST
# precedence (S.5): Industrie → Data-Center → Managed (L3) → Managed (L2) → Smart-Managed → Unmanaged.
# "Sonstige" never allowed. Must stay in lock-step with config/taxonomy/switches.yaml.
kategorie_ebene_3_switch_allowed:
  - "Industrie-Switch"
  - "Data-Center-Switch"
  - "Managed Switch (L3)"
  - "Managed Switch (L2)"
  - "Smart-Managed Switch"
  - "Unmanaged Switch"

# Word / character budgets.
budgets:
  kurzbeschreibung: { min_words: 40, max_words: 80, p_count: 2 }
  # Beschreibung floor is 70 (not 90): the operator's prose-only ruling says to write the
  # grounded length the datasheet supports — "even 70-85 words" — and NEVER pad to reach 90.
  # Rich coherent optics still run 100-175 naturally; genuinely sparse modules sit at 70-89.
  # Cables (DAC/AOC/MPO) flex DOWN further via validate.CABLE_BESCHREIBUNG_MIN_WORDS.
  beschreibung:     { min_words: 90, max_words: 175, p_count: 3 }
  titel_tag:        { max_chars: 60, must_end_with: " | Hexwaren" }
  meta_description: { min_chars: 140, max_chars: 200 }
  faq:              { min_pairs: 3, max_pairs: 10 }

# Beschreibung must end with the authenticity closer "Originaler [Brand]-..."
# This is the ONLY allowed authenticity signal. {brand} is the Hersteller token.
beschreibung_closer_prefix: "Originaler {brand}-"

# Banned language — HARD FAIL (availability/transactional claims, UWG §5 risk).
banned_hard_fail:
  - "sofort lieferbar"
  - "sofort verfügbar"
  - "Versand am selben Werktag"
  - "ab Lager Deutschland"
  - "B2B-Versand aus Deutschland"
  - "Rechnungskauf"
  - "neu und versiegelt"
  - "voller Herstellergarantie"
  # §5-UWG condition / provenance / sourcing claims — banned in ALL prose (the ONLY allowed
  # authenticity signal is the closer "Originaler {brand}-…"). Enforced as stems by gate.py G3.
  - "Neuware"
  - "Original-Neuware"
  - "versiegelt"
  - "fabrikneu"
  - "OVP"
  - "ungeöffnet"
  - "originalverpackt"
  - "autorisiert"
  - "autorisierter Distributionskanal"
  - "authorized"
  - "Distributionskanal"
  - "offizieller"
  - "Quality-ID"

# Banned language — WARN ONLY (puffery; context-dependent, flag don't fail).
banned_warn:
  - "Premium"
  - "die beste Lösung"
  - "leistungsstark"

# Condition functional attribute.
condition:
  attribute_name: "condition"
  allowed: ["new", "used", "refurbished"]
  default: "new"
